# Panels
[style]Panel.StudyPanel = border: 20, 20, 20, 20
[style]Panel.CardViewPanel = arc: 16; background: $EditorPane.background; border: 10, 10, 10, 10
[style]Panel.DashboardPanel = border: 0, 0, 0, 0
[style]Panel.DeckWidget = arc: 12; background: $TextArea.background; border: 15,15,15,15,$Component.borderColor, 1,1,1,1

[style]Panel.navigationBar = border: 15, 25, 15, 25
[style]Panel.gridContainer = opaque: false
[style]Panel.gridWrapper = opaque: false; border: 20, 20, 20, 20
[style]Panel.infoPanel = opaque: false
[style]Panel.actionPanel = opaque: false

# Labels
[style]Label.deckTitle = font: +12 bold
[style]Label.frontTextLabel = font: +8 bold
[style]Label.backTextLabel = font: +4
[style]Label.titleLabel = font: +3 bold
[style]Label.subtitleLabel = font: -1; foreground: $Label.disabledForeground
[style]Label.dueLabel = font: bold; foreground: #e65100
[style]Label.doneLabel = foreground: #2e7d32

[style]Label.logoLabel = font: +10 bold; foreground: $Component.accentColor
[style]Label.emptyLabel = font: +2 italic; foreground: $Label.disabledForeground

# Buttons
[style]Button.standard = focusable: false
[style]Button.abortButton = hoverBorderColor: #FF4444; focusable: false
[style]Button.deleteButton = background: #d32f2f; foreground: #ffffff; hoverBackground: #b71c1c; focusedBackground: #c62828; focusable: false

# Grade buttons
[style]Button.gradeAgain = outlineColor: #FF4444; borderWidth: 0; hoverBackground: darken(#FF4444, 15%)
[style]Button.gradeHard = outlineColor: #FFBB33; borderWidth: 0; hoverBackground: darken(#FFBB33, 15%)
[style]Button.gradeGood = outlineColor: #00C851; borderWidth: 0; hoverBackground: darken(#00C851, 15%)
[style]Button.gradeEasy = outlineColor: #33B5E5; borderWidth: 0; hoverBackground: darken(#33B5E5, 15%)

# ScrollPane
[style]ScrollPane.scrollPane = border: null

# MenuItem
[style]MenuItem.deleteItem = background: #d32f2f; foreground: #ffffff; selectionBackground: #b71c1c; focusable: false